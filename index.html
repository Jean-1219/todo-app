<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Tâches</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<!-- Favicon SVG inline -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231A3A5C'/%3E%3Cpath d='M18 46 C18 46 20 28 34 20 C44 14 50 18 50 18 C50 18 48 30 36 38 C28 43 18 46 18 46Z' fill='%234A9EDB' opacity='0.9'/%3E%3Cpath d='M18 46 C18 46 24 36 32 30' stroke='%23A8D8F0' stroke-width='2.5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">

<!-- Icône pour smartphone (iOS & Android) -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231A3A5C'/%3E%3Cpath d='M18 46 C18 46 20 28 34 20 C44 14 50 18 50 18 C50 18 48 30 36 38 C28 43 18 46 18 46Z' fill='%234A9EDB' opacity='0.9'/%3E%3Cpath d='M18 46 C18 46 24 36 32 30' stroke='%23A8D8F0' stroke-width='2.5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
<meta name="theme-color" content="#1A3A5C">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E8E4DC;
    --border-hover: #C8C2B4;
    --text: #1A1814;
    --text-muted: #8C8578;
    --text-faint: #B8B2A8;
    --accent: #2D5A3D;
    --accent-light: #EBF3EE;
    --danger: #C0392B;
    --amber: #D4870A;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container { max-width: 540px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .date-line {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 300;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-faint);
    transition: background 0.3s;
  }
  .status-dot.connected { background: #27AE60; }
  .status-dot.error { background: var(--danger); }

  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    flex-wrap: wrap;
  }
  .input-card input[type="text"] {
    flex: 1;
    min-width: 140px;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: transparent;
  }
  .input-card input[type="text"]::placeholder { color: var(--text-faint); }
  .input-card input[type="date"] {
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    background: transparent;
    cursor: pointer;
  }
  .input-card select {
    border: none;
    background: transparent;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    outline: none;
  }
  .add-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 7px;
    padding: 7px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.85; }
  .add-btn:disabled { opacity: 0.4; cursor: default; }

  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .filter-btn:hover:not(.active) { border-color: var(--border-hover); color: var(--text); }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    margin-bottom: 8px;
    margin-top: 1.25rem;
  }
  .section-label:first-child { margin-top: 0; }

  .todo-list { display: flex; flex-direction: column; gap: 4px; }

  .todo-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow);
    transition: border-color 0.15s, opacity 0.2s;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .todo-item:hover { border-color: var(--border-hover); }
  .todo-item.done { opacity: 0.6; }
  .todo-item.overdue { border-left: 3px solid var(--danger); }
  .todo-item.due-today { border-left: 3px solid var(--amber); }
  .todo-item.due-soon { border-left: 3px solid #27AE60; }

  .check-btn {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border-hover);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    position: relative;
  }
  .check-btn.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-btn.checked::after {
    content: '';
    width: 5px; height: 9px;
    border: 1.5px solid white;
    border-top: none; border-left: none;
    transform: rotate(45deg) translateY(-1px);
    display: block;
  }

  .priority-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .p-high { background: var(--danger); }
  .p-med  { background: var(--amber); }
  .p-low  { background: #27AE60; }

  .todo-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }

  .todo-text {
    font-size: 14px;
    color: var(--text);
    outline: none;
    background: transparent;
    border: none;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--text-faint);
  }

  .due-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 1px 7px;
    border-radius: 20px;
    display: inline-block;
    width: fit-content;
  }
  .due-badge.overdue { background: #FDE8E6; color: var(--danger); }
  .due-badge.due-today { background: #FEF3DC; color: var(--amber); }
  .due-badge.due-soon { background: #E8F5E9; color: #27AE60; }
  .due-badge.normal { background: var(--bg); color: var(--text-muted); }

  .due-input {
    font-size: 11px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    padding: 0;
  }

  .prio-select {
    font-size: 14px;
    border: none;
    background: transparent;
    cursor: pointer;
    outline: none;
    padding: 0;
    flex-shrink: 0;
  }

  .del-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-faint);
    font-size: 18px;
    line-height: 1;
    padding: 2px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .todo-item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--danger); }

  .empty {
    text-align: center;
    color: var(--text-faint);
    font-size: 14px;
    padding: 2rem 0;
    font-style: italic;
  }

  .stats-bar {
    display: flex;
    gap: 20px;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat { font-size: 12px; color: var(--text-muted); }
  .stat strong { color: var(--text); font-weight: 500; }

  .loader {
    text-align: center;
    color: var(--text-faint);
    font-size: 13px;
    padding: 1.5rem 0;
  }

  @media (max-width: 480px) {
    body { padding: 1.25rem 0.75rem 3rem; }
    header h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Mes tâches</h1>
    <p class="date-line" id="date-label"></p>
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connexion…</span>
    </div>
  </header>

  <div class="input-card">
    <input type="text" id="new-task" placeholder="Nouvelle tâche…" autocomplete="off" />
    <input type="date" id="new-due" title="Date d'échéance" />
    <select id="new-priority" title="Priorité">
      <option value="high">🔴</option>
      <option value="med" selected>🟡</option>
      <option value="low">🟢</option>
    </select>
    <button class="add-btn" id="add-btn" onclick="addTodo()">Ajouter</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Toutes</button>
    <button class="filter-btn" onclick="setFilter('active', this)">En cours</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Terminées</button>
    <button class="filter-btn" onclick="setFilter('overdue', this)">En retard</button>
  </div>

  <div id="todo-container"><div class="loader">Chargement…</div></div>

  <div class="stats-bar">
    <div class="stat"><strong id="stat-total">0</strong> tâches</div>
    <div class="stat"><strong id="stat-done">0</strong> terminées</div>
    <div class="stat"><strong id="stat-left">0</strong> restantes</div>
    <div class="stat"><strong id="stat-overdue">0</strong> en retard</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tqurezznmkhvzbktwnnz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxdXJlenpubWtodnpia3R3bm56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MTg5ODAsImV4cCI6MjA5NjE5NDk4MH0.uBhhMzibGzWmiXoSxfZwLSPiORCjrGmO1TFbtoCWzeU';
const API = `${SUPABASE_URL}/rest/v1/todos`;
const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=representation'
};

let todos = [];
let filter = 'all';

const today = new Date();
today.setHours(0,0,0,0);
document.getElementById('date-label').textContent =
  today.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

function setStatus(state) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot ' + state;
  txt.textContent = state === 'connected' ? 'Synchronisé' : state === 'error' ? 'Erreur de connexion' : 'Connexion…';
}

async function api(method, path='', body=null) {
  const opts = { method, headers: { ...HEADERS } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

async function loadTodos() {
  try {
    const data = await api('GET', '?order=created_at.desc');
    todos = data || [];
    setStatus('connected');
    render();
  } catch(e) {
    setStatus('error');
    document.getElementById('todo-container').innerHTML =
      '<div class="empty">Impossible de charger les tâches.<br>Vérifie ta connexion.</div>';
  }
}

async function addTodo() {
  const input = document.getElementById('new-task');
  const text = input.value.trim();
  if (!text) return;
  const priority = document.getElementById('new-priority').value;
  const due_date = document.getElementById('new-due').value || null;
  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  input.value = '';
  document.getElementById('new-due').value = '';
  try {
    const [created] = await api('POST', '', { text, done: false, priority, due_date });
    todos.unshift(created);
    render();
  } catch(e) { setStatus('error'); }
  btn.disabled = false;
  input.focus();
}

async function toggleTodo(id) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  render();
  try {
    await api('PATCH', `?id=eq.${id}`, { done: t.done });
  } catch(e) { t.done = !t.done; render(); setStatus('error'); }
}

async function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  render();
  try {
    await api('DELETE', `?id=eq.${id}`);
  } catch(e) { setStatus('error'); loadTodos(); }
}

async function updateText(id, text) {
  if (!text.trim()) return;
  try {
    await api('PATCH', `?id=eq.${id}`, { text: text.trim() });
  } catch(e) { setStatus('error'); }
}

async function updatePriority(id, priority) {
  const t = todos.find(t => t.id === id);
  if (t) t.priority = priority;
  try {
    await api('PATCH', `?id=eq.${id}`, { priority });
  } catch(e) { setStatus('error'); }
}

async function updateDueDate(id, due_date) {
  try {
    await api('PATCH', `?id=eq.${id}`, { due_date: due_date || null });
    const t = todos.find(t => t.id === id);
    if (t) t.due_date = due_date || null;
    render();
  } catch(e) { setStatus('error'); }
}

function getDueStatus(due_date) {
  if (!due_date) return null;
  const due = new Date(due_date);
  due.setHours(0,0,0,0);
  const diff = Math.round((due - today) / 86400000);
  if (diff < 0) return 'overdue';
  if (diff === 0) return 'due-today';
  if (diff <= 3) return 'due-soon';
  return 'normal';
}

function dueBadgeLabel(due_date) {
  if (!due_date) return '';
  const due = new Date(due_date);
  due.setHours(0,0,0,0);
  const diff = Math.round((due - today) / 86400000);
  if (diff < 0) return `En retard de ${Math.abs(diff)} jour${Math.abs(diff)>1?'s':''}`;
  if (diff === 0) return "Aujourd'hui";
  if (diff === 1) return 'Demain';
  return due.toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  let visible = todos;
  if (filter === 'active') visible = todos.filter(t => !t.done);
  if (filter === 'done')   visible = todos.filter(t =>  t.done);
  if (filter === 'overdue') visible = todos.filter(t => !t.done && getDueStatus(t.due_date) === 'overdue');

  const active = visible.filter(t => !t.done);
  const done   = visible.filter(t =>  t.done);

  let html = '';
  if (filter !== 'done' && active.length > 0) {
    if (filter === 'all') html += '<div class="section-label">En cours</div>';
    html += '<div class="todo-list">' + active.map(todoHTML).join('') + '</div>';
  }
  if (filter !== 'active' && filter !== 'overdue' && done.length > 0) {
    if (filter === 'all') html += '<div class="section-label">Terminées</div>';
    html += '<div class="todo-list">' + done.map(todoHTML).join('') + '</div>';
  }
  if (visible.length === 0) html = '<div class="empty">Aucune tâche ici</div>';

  document.getElementById('todo-container').innerHTML = html;

  const total = todos.length;
  const doneCount = todos.filter(t => t.done).length;
  const overdueCount = todos.filter(t => !t.done && getDueStatus(t.due_date) === 'overdue').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = doneCount;
  document.getElementById('stat-left').textContent = total - doneCount;
  document.getElementById('stat-overdue').textContent = overdueCount;
}

function todoHTML(t) {
  const pc = { high:'p-high', med:'p-med', low:'p-low' }[t.priority] || 'p-med';
  const dueStatus = getDueStatus(t.due_date);
  const dueLabel = dueBadgeLabel(t.due_date);
  const itemClass = ['todo-item', t.done?'done':'', dueStatus&&!t.done?dueStatus:''].filter(Boolean).join(' ');
  const badgeHtml = dueStatus && !t.done
    ? `<span class="due-badge ${dueStatus}">${dueLabel}</span>`
    : '';

  return `<div class="${itemClass}" data-id="${t.id}">
    <button class="check-btn${t.done?' checked':''}" onclick="toggleTodo(${t.id})" aria-label="Basculer"></button>
    <div class="priority-dot ${pc}"></div>
    <div class="todo-main">
      <span class="todo-text" contenteditable="true"
        onblur="updateText(${t.id}, this.textContent)"
        onkeydown="if(event.key==='Enter'){this.blur();event.preventDefault();}"
      >${esc(t.text)}</span>
      ${badgeHtml ? badgeHtml : `<input type="date" class="due-input" value="${t.due_date||''}" onchange="updateDueDate(${t.id}, this.value)" title="Date d'échéance">`}
    </div>
    <select class="prio-select" onchange="updatePriority(${t.id}, this.value)" aria-label="Priorité">
      <option value="high"${t.priority==='high'?' selected':''}>🔴</option>
      <option value="med"${t.priority==='med'?' selected':''}>🟡</option>
      <option value="low"${t.priority==='low'?' selected':''}>🟢</option>
    </select>
    <button class="del-btn" onclick="deleteTodo(${t.id})" aria-label="Supprimer">×</button>
  </div>`;
}

document.getElementById('new-task').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTodo();
});

loadTodos();
</script>
</body>
</html>
